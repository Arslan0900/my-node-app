name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 4. Build & Push Backend
      - name: Build Backend
        run: |
          docker build -t backend ./backend
          docker tag backend:latest ${{ secrets.ECR_REPOSITORY_BACKEND }}:latest
          docker push ${{ secrets.ECR_REPOSITORY_BACKEND }}:latest

      # 5. Build & Push Frontend
      - name: Build Frontend
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest ${{ secrets.ECR_REPOSITORY_FRONTEND }}:latest
          docker push ${{ secrets.ECR_REPOSITORY_FRONTEND }}:latest

      # 6. Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.CLUSTER_NAME }}

      # 7. Deploy to Kubernetes
      - name: Deploy
        run: |
          kubectl apply -f k8s/
