<!DOCTYPE html>
<html>
<head>
  <title>Frontend</title>
</head>
<body>
  <h1>Frontend developer arslan khan Application</h1>

  <button onclick="callAPI()">Call Backend</button>
  <p id="output"></p>

  <script>
    function callAPI() {
      fetch("/api")
        .then(res => res.text())
        .then(data => {
          document.getElementById("output").innerText = data;
        });
    }
  </script>
</body>
</html>
